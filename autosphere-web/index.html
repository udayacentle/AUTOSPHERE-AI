<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        var t = localStorage.getItem('autosphere-theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>AutoSphere AI - Mobility & Vehicle Intelligence Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; min-height: 100vh; background: #0a0e14; color: #e6edf3; font-family: system-ui, sans-serif; }
      #root { min-height: 100vh; }
      .fallback { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
      .fallback h1 { margin: 0 0 1rem; font-size: 1.5rem; }
      .fallback a { color: #00d4aa; margin: 0.5rem; }
      .fallback p { color: #8b949e; margin: 0.5rem 0; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="fallback" id="fallback">
        <h1>AutoSphere AI</h1>
        <p>Loading…</p>
        <p><a href="/">Go to Welcome</a> · <a href="/auth/login">Login</a></p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
